<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Management Cost Visualizer</title>
  <link rel="stylesheet" href="MCOST.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light">

  <div class="header">
    <h2>Management &amp; Cost Visualizer</h2>
    <button id="themeBtn">🌙 Dark Mode</button>
  </div>

  <div class="container">

    <div class="balance-box">
      <p class="balance-label">TOTAL BALANCE</p>
      <h1 id="totalBalance">$0.00</h1>
    </div>

    <div class="card">
      <h3>Add Transaction</h3>

      <label for="itemName">Item Name</label>
      <input type="text" id="itemName" placeholder="e.g. Coffee" />

      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="e.g. 14.94" min="0.01" step="0.01" />

      <label for="category">Category</label>
      <select id="category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Fun">Fun</option>
      </select>

      <p class="error-msg" id="errorMsg"></p>
      <button class="btn-add" id="addBtn">Add Transaction</button>
    </div>

    <div class="bottom-row">

      <div class="card">
        <h3>Transactions</h3>
        <div id="transactionList">
          <p class="empty-text" id="emptyText">No transactions yet.</p>
        </div>
      </div>

      <div class="card">
        <h3>Spending by Category</h3>
        <div class="chart-area">
          <canvas id="spendingChart"></canvas>
          <p class="empty-text" id="chartEmpty">No data yet.</p>
        </div>
        <div class="legend">
          <span><span class="dot food"></span>Food</span>
          <span><span class="dot transport"></span>Transport</span>
          <span><span class="dot fun"></span>Fun</span>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
